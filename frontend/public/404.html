<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Job Application Tracker</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GitHub Pages serves a 404 for a deep link (e.g. /login),
      // this page encodes the path into the query string and redirects
      // to the root, where the inline script in index.html restores it.
      var segmentCount = 1; // number of path segments in the repo name
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?p=/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
