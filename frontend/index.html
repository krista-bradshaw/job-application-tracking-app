<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <!-- GitHub Pages SPA: restore the path encoded by 404.html -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the query-string encoding approach from 404.html
        var search = window.location.search;
        if (search.indexOf('?p=/') === 0 || search.indexOf('&p=/') !== -1) {
          var decoded = search
            .slice(1)
            .split('&')
            .reduce(function (acc, part) {
              var kv = part.split('=');
              acc[kv[0]] = kv.slice(1).join('=').replace(/~and~/g, '&');
              return acc;
            }, {});
          window.history.replaceState(
            null,
            null,
            window.location.pathname.slice(0, -1) +
              (decoded.p || '/') +
              (decoded.q ? '?' + decoded.q : '') +
              window.location.hash
          );
        }
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Job application tracker</title>

    <!-- For mobile use -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="JobTracker" />
    <link rel="apple-touch-icon" href="/logo.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
